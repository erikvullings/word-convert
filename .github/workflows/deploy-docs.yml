name: Verify and deploy WordConvert

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wordconvert-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js 24
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install EPUBCheck 5.3.0
        env:
          EPUBCHECK_SHA256: 6c07e68584b2e2ce2f89fe06e1246dfead3eb36b46b340e7d93524f29dcff6c5
        run: |
          curl --fail --location --silent --show-error \
            --output "$RUNNER_TEMP/epubcheck.zip" \
            https://github.com/w3c/epubcheck/releases/download/v5.3.0/epubcheck-5.3.0.zip
          echo "$EPUBCHECK_SHA256  $RUNNER_TEMP/epubcheck.zip" | sha256sum --check --strict
          unzip -q "$RUNNER_TEMP/epubcheck.zip" -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/epubcheck-5.3.0" >> "$GITHUB_PATH"

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Check types
        run: pnpm typecheck

      - name: Test and validate representative EPUBs
        run: pnpm test

      - name: Build static application
        run: pnpm build

      - name: Verify static offline output
        run: pnpm static:check

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: apps/web/dist
          retention-days: 1

  deploy:
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
